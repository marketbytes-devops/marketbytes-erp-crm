version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: marketbytes-erp-backend
    restart: always
    ports:
      - "6500:8000"
    env_file:
      - ./backend/.env
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    networks:
      - marketbytes-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: marketbytes-erp-frontend
    restart: always
    ports:
      - "6501:80"
    depends_on:
      - backend
    networks:
      - marketbytes-network

networks:
  marketbytes-network:
    driver: bridge

volumes:
  backend_media:
  backend_static:
