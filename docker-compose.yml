version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: mysql_marketbytes_erp
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: erpcrmmarketbytes@9633
      MYSQL_DATABASE: marketbytes_crm
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - marketbytes-erp-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: marketbytes-erp-backend
    restart: always
    ports:
      - "6500:8000"
    env_file:
      - ./backend/.env
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    depends_on:
      - db
    networks:
      - marketbytes-erp-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: marketbytes-erp-frontend
    restart: always
    ports:
      - "6501:80"
    depends_on:
      - backend
    networks:
      - marketbytes-erp-network

networks:
  marketbytes-erp-network:
    driver: bridge

volumes:
  backend_media:
  backend_static:
  mysql_data: